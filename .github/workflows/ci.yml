name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn starlette pydantic python-multipart python-dotenv bcrypt PyJWT redis pymongo requests pytest httpx
          pip install --no-deps -r requirements.txt 2>/dev/null || true

      - name: Run tests
        env:
          ENV: test
          JWT_SECRET: ci-test-secret
          API_KEY: ""
          MONGO_URI: ""
          REDIS_URL: ""
          ENABLE_ML_CLASSIFIER: "false"
          ENABLE_LLM_SUMMARY: "false"
          ENABLE_VIRUS_SCAN: "false"
          USE_CELERY: "false"
        run: pytest tests/ --tb=short -q

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    name: Integration Tests (API + WebSocket)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn starlette pydantic python-multipart python-dotenv bcrypt PyJWT redis pymongo requests pytest httpx websockets
          pip install --no-deps -r requirements.txt 2>/dev/null || true

      - name: Run integration tests
        env:
          ENV: test
          JWT_SECRET: ci-test-secret
          API_KEY: ""
          MONGO_URI: ""
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ENABLE_ML_CLASSIFIER: "false"
          ENABLE_LLM_SUMMARY: "false"
          ENABLE_VIRUS_SCAN: "false"
          USE_CELERY: "false"
        run: pytest tests/integration/ --tb=short -q

  container-scan:
    name: Container Image Scanning (Trivy)
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rmsi-backend:ci ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rmsi-backend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
