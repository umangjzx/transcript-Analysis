version: "3.9"

# Use Google + Cloudflare DNS on all containers so they can resolve
# external hostnames (MongoDB Atlas *.mongodb.net etc.).
# Docker's built-in DNS sometimes fails for external domains.
x-dns: &dns
  dns:
    - 8.8.8.8
    - 1.1.1.1

services:
  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rmsi-redis
    restart: unless-stopped
    <<: *dns
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmsi-backend
    restart: unless-stopped
    <<: *dns
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
      - backend_logs:/app/logs
      - model_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    # Healthcheck lets the frontend wait until FastAPI is actually ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmsi-celery-worker
    restart: unless-stopped
    <<: *dns
    # Fix: use module:attribute syntax so Celery finds the app object correctly
    command: celery -A celery_app:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
      - backend_logs:/app/logs
      - model_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmsi-celery-beat
    restart: unless-stopped
    <<: *dns
    # Fix: same module:attribute fix as celery-worker
    command: celery -A celery_app:celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./admin-next
      dockerfile: Dockerfile
    container_name: rmsi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    # Wait for backend to pass its healthcheck before Next.js starts accepting requests
    depends_on:
      backend:
        condition: service_healthy

  # ── ClamAV (optional virus scanning) ───────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: rmsi-clamav
    restart: unless-stopped
    <<: *dns
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    profiles:
      - full  # Only starts with: docker compose --profile full up

  # ── Ollama (optional LLM summaries) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rmsi-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - full  # Only starts with: docker compose --profile full up

volumes:
  redis_data:
  backend_uploads:
  backend_reports:
  backend_logs:
  model_cache:
  clamav_data:
  ollama_data:
